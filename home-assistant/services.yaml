# Services for Hound MCP integration
# Allows calling hound-mcp tools from Home Assistant

fetch_webpage:
  description: Fetch a webpage and extract content
  fields:
    url:
      description: The URL to fetch
      example: https://example.com
      required: true
      selector:
        text:
    use_browser:
      description: Use stealth browser mode (bypasses anti-bot protections)
      example: false
      default: false
      selector:
        boolean:
    extract:
      description: Extraction mode (article, main, markdown, all)
      example: article
      default: article
      selector:
        select:
          options:
            - article
            - main
            - markdown
            - all

web_search:
  description: Search the web using hound's keyless metasearch
  fields:
    query:
      description: Search query
      example: latest Python version
      required: true
      selector:
        text:
    num_results:
      description: Number of results to return
      example: 10
      default: 10
      selector:
        number:
          min: 1
          max: 50

crawl_website:
  description: Crawl a website and extract all linked pages
  fields:
    url:
      description: Starting URL
      example: https://example.com
      required: true
      selector:
        text:
    max_pages:
      description: Maximum pages to crawl
      example: 10
      default: 10
      selector:
        number:
          min: 1
          max: 100

take_screenshot:
  description: Take a screenshot of a webpage
  fields:
    url:
      description: The URL to screenshot
      example: https://example.com
      required: true
      selector:
        text:
    width:
      description: Viewport width in pixels
      example: 1920
      default: 1920
      selector:
        number:
          min: 800
          max: 4096
    height:
      description: Viewport height in pixels
      example: 1080
      default: 1080
      selector:
        number:
          min: 600
          max: 4096