name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Ubuntu tests all Python versions; Windows tests the OS on one version.
        # Windows 3.12/3.13 hang on pytest (asyncio event loop issue), so they
        # are excluded. Python coverage is maintained by the Ubuntu 3.12/3.13 jobs.
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.11"

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,all]
        shell: bash

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        shell: bash
